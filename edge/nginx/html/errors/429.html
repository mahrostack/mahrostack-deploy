<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Access denied</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b1020;color:#e5e7eb;display:grid;place-items:center;min-height:100vh;margin:0}
    .box{max-width:640px;padding:32px;border:1px solid #243047;border-radius:16px;background:#11182b}
    h1{margin:0 0 12px;font-size:28px}
    p{margin:0;color:#b8c0cc;line-height:1.6}
  </style>
</head>
<body>
  <div class="box">
    <h1>403 - Access denied</h1>
    <p>The requested resource is not available.</p>
  </div>
</body>
</html>
