# keep this at end;
# any other domain will show a custom page
server {
    listen 8443 ssl;
    http2 on;

    server_name *.mahrostack.test;

    include /etc/nginx/includes/shared-error-pages.conf;
    include /etc/nginx/includes/ssl-common.conf;
    include /etc/nginx/includes/security-headers.conf;
        include /etc/nginx/includes/logging.conf;

    location = /healthz {
        proxy_pass http://mahrostack_land_stream/healthz;
        include /etc/nginx/includes/proxy-pass-harden.conf;
        
        access_log off;
    }

    location / {
        proxy_pass http://mahrostack_land_stream$request_uri;
        
                include /etc/nginx/includes/proxy-pass-harden.conf;
    }
}
