# api
server {
    listen 8443 ssl;
    http2 on;
    
    server_name api.mahrostack.test;

    

    
        
        include /etc/nginx/includes/ssl-common.conf;
        include /etc/nginx/includes/logging.conf;

    location /socket.io/ {
        proxy_pass http://mahrostack_api_stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location = /healthz {
        proxy_pass http://mahrostack_api_stream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {

    
        proxy_pass http://mahrostack_api_stream$request_uri;



        include /etc/nginx/includes/proxy-hardening.conf;
    }



    include /etc/nginx/includes/ratelimit-page.conf;
}






