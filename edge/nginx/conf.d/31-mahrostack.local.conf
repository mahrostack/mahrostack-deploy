# the target: *.mahrostack.test
server {
    listen 8080;
    server_name mahrostack.test *.mahrostack.test;

    return 301 https://$host$request_uri;
}

upstream mahrostack_land_stream {

    server mahrostack_land:8080;
   

}


# upstream mahrostack_app_stream{
#         server mahrostack_app:8080;
# }
upstream mahrostack_dash_stream{
        server mahrostack_dash:8080;
}

upstream mahrostack_api_stream{
        server mahrostack_api:3030;
}

# upstream mahrostack_minio_stream{
#         server mahrostack_q1_minio:9000;
# }

# upstream mahrostack_minioc_stream{
#         server mahrostack_q1_minio:9001;
# }





server {
    listen 8443 ssl;
    http2 on;

    server_name www.mahrostack.test mahrostack.test;

    include /etc/nginx/includes/shared-error-pages.conf;
    include /etc/nginx/includes/ssl-common.conf;

    error_log  /dev/stderr warn;
    access_log /dev/stdout combined;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /healthz {
        proxy_pass http://mahrostack_land_stream/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://mahrostack_land_stream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}


