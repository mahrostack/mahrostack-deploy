
name: edge_nginx
services:
  edge-nginx:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: edge-nginx
    restart: unless-stopped

    ports:
      - "80:8080"
      - "443:8443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/upstreams:/etc/nginx/upstreams:ro
      - ./nginx/files:/etc/nginx/files:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/html:/usr/share/nginx/html:ro

    networks:
      - edge-network


    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /var/cache/nginx:rw,noexec,nosuid,size=128m
      - /var/run:rw,noexec,nosuid,size=16m

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  edge-network:
    external: true
    name: edge-network

