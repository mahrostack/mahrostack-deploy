name: mahrostack

services:   
  land:
    image: ghcr.io/mahrostack/mahrostack-land:${LAND_DOCKER_IMAGE_VERSION}
    container_name: mahrostack_land
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    env_file:
      - ./env/.env.land
      - ./.env
        
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    mem_limit: 128m
    cpus: "0.25"
    
    networks:
      - edge-network

  # app:
  #   image: ghcr.io/mahrostack/mahrostack-app:${APP_DOCKER_IMAGE_VERSION}
  #   container_name: mahrostack_app
  #   restart: unless-stopped
