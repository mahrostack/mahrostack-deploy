  dash:
    image: ghcr.io/mahrostack/mahrostack-dash:${DASH_DOCKER_IMAGE_VERSION}
    container_name: mahrostack_dash
    restart: unless-stopped
    env_file:
      - ./env/.env.dash
      
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
      
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    mem_limit: 128m
    cpus: "0.25"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    networks:
      - edge-network

