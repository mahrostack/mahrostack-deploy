  api:
    image: ghcr.io/mahrostack/mahrostack-api:${API_DOCKER_IMAGE_VERSION}
    container_name: mahrostack_api
    restart: unless-stopped

    env_file:
      - ./env/.env.api
      - ./.env

    expose:
      - "3030"

    networks:
      - edge-network
      # - postgres-shared
      # - redis-shared


    # depends_on:
    #   minio:
    #     condition: service_healthy
    #   gotenberg:
    #     condition: service_healthy
     
        
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get({ hostname: '127.0.0.1', port: 3030, path: '/health', headers: { 'User-Agent': 'mahrostack.api' } }, r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 20s

    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
          pids: 256

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"


volumes:
  minio-data:

  
networks:
  edge-network:
    external: true
